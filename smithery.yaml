# Smithery Registry — HiveSwap MCP Server

startCommand:
  type: http
  configSchema:
    type: object
    properties:
      did:
        type: string
        title: "Agent DID"
        x-order: 0
      api_key:
        type: string
        title: "API Key"
        x-sensitive: true
        x-order: 1
      default_rail:
        type: string
        title: "Settlement Rail"
        enum:
          - base-usdc
          - aleo-usdcx
        default: base-usdc
        x-order: 2
    required: []
  url: https://hiveswap.onrender.com/mcp

name: hiveswap-mcp
displayName: HiveSwap — Agent-Native vAMM DEX
version: "1.0.0"
description: >
  Agent-native vAMM DEX for swapping USDC, USDCx, USAD, and ALEO across 4 settlement rails.
  ZK-private swaps via Aleo rail. Deep liquidity from Hive Civilization genesis agent pool.
  Settles in milliseconds via HiveBank. Part of Hive Civilization (thehiveryiq.com).

author:
  name: Steve Rotzin
  email: steve@thehiveryiq.com
  url: https://www.thehiveryiq.com

license: MIT
homepage: https://www.thehiveryiq.com
repository:
  type: git
  url: https://github.com/srotzin/hive-mcp-swap

transport: streamable-http
endpoint: https://hiveswap.onrender.com/mcp
protocol: "2024-11-05"

categories:
  - defi
  - agent-to-agent
  - web3
  - payments
  - zero-knowledge

tags:
  - mcp
  - hive
  - swap
  - vamm
  - dex
  - usdc
  - aleo
  - zk
  - base-l2
  - defai
  - ai-agents
  - settlement

runtime:
  type: node
  version: ">=18"
  command: node server.js
  env:
    - name: PORT
      default: "3000"
      required: false
